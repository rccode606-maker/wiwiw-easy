name: Tiwar Auto-Hunt Bot

on:
  schedule:
    # Запуск каждые 6 часов. GitHub может задержать запуск на несколько минут
    # относительно расписания (особенность бесплатных раннеров) — это нормально.
    - cron: '0 */6 * * *'
  # Позволяет запустить вручную из вкладки Actions для проверки
  workflow_dispatch: {}

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # Жёсткий лимит GitHub Actions на бесплатном плане — 360 минут (6 часов).
    # Берём с запасом, чтобы job завершился сам, а не был убит силой.
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run bot
        env:
          COOKIES_JSON: ${{ secrets.COOKIES_JSON }}
          GAME_URL: 'https://tiwar.ru/distshores/hunt'
          RUN_MINUTES: '340'
        run: node bot.js
